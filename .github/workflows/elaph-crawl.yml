name: Elaph Crawl (Full/Incremental)

on:
  schedule:
    # 4:00 AM IST = 22:30 UTC (previous day)
    - cron: '30 22 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Crawl mode'
        required: true
        default: 'incremental'
        type: choice
        options:
          - incremental
          - full
      max_urls:
        description: 'Max URLs to crawl (optional)'
        required: false
        type: string
      time_limit:
        description: 'Time limit in seconds'
        required: false
        default: '18000'
        type: string

permissions:
  actions: write
  contents: read

env:
  PYTHON_VERSION: '3.11'

jobs:
  crawl:
    name: Elaph Crawler
    runs-on: ubuntu-latest
    timeout-minutes: 330

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write GCP service account key
        run: |
          mkdir -p data
          echo '${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}' > data/service-account.json

      - name: Write .env file
        run: |
          cat > .env << 'ENVEOF'
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}
          GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
          BIGQUERY_DATASET=elaph_content
          BIGQUERY_TABLE=elaph_pages
          GOOGLE_CREDENTIALS_PATH=./data/service-account.json
          SITEMAP_MAIN=https://elaph.com/sitemaps/allsitemaps.xml
          SITEMAP_GOOGLE_NEWS=https://elaph.com/sitemaps/google_news.xml
          BATCH_SIZE=5
          REQUEST_DELAY=1.0
          MAX_RETRIES=3
          MAX_URL_FAILURES=5
          LOG_LEVEL=INFO
          LOG_FILE=./logs/elaph_crawler.log
          ENVEOF

      - name: Run diagnostics
        run: python -c "from elaph_crawler.pipeline import ElaphPipeline; p = ElaphPipeline(dry_run=False); p.run_diagnostics()"
        env:
          PYTHONUNBUFFERED: 1

      - name: Check pending URL count
        id: pending-check
        run: |
          count=$(python -c "
          from elaph_crawler.core import SupabaseManager
          from elaph_crawler.utils import Config
          config = Config.load()
          db = SupabaseManager(config.supabase_url, config.supabase_key)
          print(db.get_pending_count())
          ")
          echo "pending_count=$count" >> $GITHUB_OUTPUT
          echo "Pending URLs: $count"

      - name: Update sitemap state
        if: steps.pending-check.outputs.pending_count > 0
        run: python elaph_crawler/pipeline.py --update-sitemap
        env:
          PYTHONUNBUFFERED: 1

      - name: Run crawl
        if: steps.pending-check.outputs.pending_count > 0
        run: |
          MAX_URLS_ARG=""
          if [ -n "${{ github.event.inputs.max_urls }}" ]; then
            MAX_URLS_ARG="--max-urls ${{ github.event.inputs.max_urls }}"
          fi
          python elaph_crawler/pipeline.py \
            --mode ${{ github.event.inputs.mode || 'incremental' }} \
            --time-limit ${{ github.event.inputs.time_limit || 18000 }} \
            $MAX_URLS_ARG
        env:
          PYTHONUNBUFFERED: 1

      - name: Check if more work needed
        id: more-work
        if: always()
        run: |
          count=$(python -c "
          from elaph_crawler.core import SupabaseManager
          from elaph_crawler.utils import Config
          config = Config.load()
          db = SupabaseManager(config.supabase_url, config.supabase_key)
          print(db.get_pending_count())
          ")
          echo "pending_count=$count" >> $GITHUB_OUTPUT
          echo "Remaining pending: $count"

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: elaph-crawl-logs-${{ github.run_number }}
          path: logs/
          retention-days: 14

      - name: Self-chain next run if pending
        if: steps.more-work.outputs.pending_count > 0
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "More URLs pending (${{ steps.more-work.outputs.pending_count }}), triggering next run..."
          gh workflow run elaph-crawl.yml \
            -f mode=incremental \
            -f time_limit=18000